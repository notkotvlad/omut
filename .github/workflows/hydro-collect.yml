name: Hydro Data Collector

on:
  # Каждые 12 часов: 06:00 и 18:00 UTC (11:00 и 23:00 Алматы UTC+5)
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  # Запуск вручную из вкладки Actions
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY_RUN (не пишем в KV, только логи)'
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: omut-worker/scripts/package.json

      - name: Install Chrome (for Puppeteer fallback)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            fonts-freefont-ttf \
            libxss1 \
            2>/dev/null || true
          # Fallback: chromium
          which google-chrome-stable || sudo apt-get install -y chromium-browser

      - name: Install collector dependencies
        working-directory: omut-worker/scripts
        run: npm install

      - name: Run hydro collector
        working-directory: omut-worker/scripts
        env:
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
          PUPPETEER_EXECUTABLE: /usr/bin/google-chrome-stable
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: node collect-hydro.js

      - name: Upload debug XHR dump (если есть)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydro-debug-xhr
          path: omut-worker/scripts/debug-captured-xhr.json
          if-no-files-found: ignore
          retention-days: 7
